---
# postgres cluster is deployed 2nd because we need secrets and persistent volumes up 1st
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-postgres-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: nextcloud
  destination:
    server: "https://kubernetes.default.svc"
    namespace: nextcloud
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
  source:
    repoURL: https://github.com/small-hack/argocd-apps
    path: postgres/operators/zalando/postgres_cluster/
    targetRevision: main
    helm:
      valuesObject:
        cluster_name: nextcloud-postgres
        user: nextcloud
        databases:
          nextcloud: nextcloud
