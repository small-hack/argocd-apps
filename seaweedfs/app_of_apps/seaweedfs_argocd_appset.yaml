---
# webapp is deployed 2nd because we need secrets and persistent volumes up 1st
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: seaweedfs-web-app-set
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  goTemplate: true
  # generator allows us to source specific values from an external k8s secret
  generators:
    - plugin:
        configMapRef:
          name: secret-var-plugin-generator
        input:
          parameters:
            secret_vars:
              - seaweedfs_hostname
              - seaweedfs_s3_endpoint
              - seaweedfs_s3_region
              - global_cluster_issuer
  template:
    metadata:
      name: seaweedfs-web-app
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    spec:
      project: seaweedfs
      destination:
        server: https://kubernetes.default.svc
        namespace: seaweedfs
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        automated:
          prune: true
          selfHeal: true
      source:
        # only for testing our own patches before PRs
        # repoURL: https://github.com/jessebot/seaweedfs
        # targetRevision: main
        # path: k8s/charts/seaweedfs/

        repoURL: 'https://seaweedfs.github.io/seaweedfs/helm'
        targetRevision: 3.63.0
        chart: seaweedfs
        helm:
          releaseName: seaweedfs
          values: |
            global:
              createClusterRole: true
              registry: ""
              repository: ""
              imageName: chrislusf/seaweedfs
              imagePullPolicy: IfNotPresent
              imagePullSecrets: ""
              restartPolicy: Always
              loggingLevel: 1
              enableSecurity: false
              masterServer: null
              securityConfig:
                jwtSigning:
                  volumeWrite: true
                  volumeRead: false
                  filerWrite: false
                  filerRead: false
              serviceAccountName: "seaweedfs"
              certificates:
                alphacrds: false
              monitoring:
                enabled: false
                gatewayHost: null
                gatewayPort: null
              enableReplication: false
              replicationPlacment: "001"
              extraEnvironmentVars:
                WEED_CLUSTER_DEFAULT: "sw"
                WEED_CLUSTER_SW_MASTER: "seaweedfs-master.seaweedfs:9333"
                WEED_CLUSTER_SW_FILER: "seaweedfs-filer-client.seaweedfs:8888"
            image:
              registry: ""
              repository: ""
            master:
              enabled: true
              repository: null
              imageName: null
              imageTag: null
              imageOverride: null
              restartPolicy: null
              replicas: 1
              port: 9333
              grpcPort: 19333
              metricsPort: 9327
              ipBind: "0.0.0.0"
              volumePreallocate: false
              volumeSizeLimitMB: 1000
              loggingOverrideLevel: null
              pulseSeconds: null
              garbageThreshold: null
              metricsIntervalSec: 15
              defaultReplication: "000"
              disableHttp: false
              config: |-
                # Enter any extra configuration for master.toml here.
                # It may be be a multi-line string.
              data:
                type: "existingClaim"
                claimName: "swfs-master-data"
              logs:
                type: "hostPath"
                size: ""
                storageClass: ""
                hostPathPrefix: /storage
              sidecars: []
              initContainers: ""
              extraVolumes: ""
              extraVolumeMounts: ""
              podManagementPolicy: Parallel
              resources: null
              updatePartition: 0
              affinity: |
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: {{ template "seaweedfs.name" . }}
                          app.kubernetes.io/instance: {{ .Release.Name }}
                          app.kubernetes.io/component: master
                      topologyKey: kubernetes.io/hostname
              tolerations: ""
              nodeSelector: |
                kubernetes.io/arch: amd64
              priorityClassName: ""
              serviceAccountName: ""
              ingress:
                enabled: false
                className: "nginx"
                host: "master.seaweedfs.local"
                annotations: |
                  nginx.ingress.kubernetes.io/auth-type: "basic"
                  nginx.ingress.kubernetes.io/auth-secret: "default/ingress-basic-auth-secret"
                  nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required - SW-Master'
                  nginx.ingress.kubernetes.io/service-upstream: "true"
                  nginx.ingress.kubernetes.io/rewrite-target: /$1
                  nginx.ingress.kubernetes.io/use-regex: "true"
                  nginx.ingress.kubernetes.io/enable-rewrite-log: "true"
                  nginx.ingress.kubernetes.io/ssl-redirect: "false"
                  nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
                  nginx.ingress.kubernetes.io/configuration-snippet: |
                    sub_filter '<head>' '<head> <base href="/sw-master/">'; #add base url
                    sub_filter '="/' '="./';                                #make absolute paths to relative
                    sub_filter '=/' '=./';
                    sub_filter '/seaweedfsstatic' './seaweedfsstatic';
                    sub_filter_once off;
                tls: []
              extraEnvironmentVars:
                WEED_MASTER_VOLUME_GROWTH_COPY_1: '7'
                WEED_MASTER_VOLUME_GROWTH_COPY_2: '6'
                WEED_MASTER_VOLUME_GROWTH_COPY_3: '3'
                WEED_MASTER_VOLUME_GROWTH_COPY_OTHER: '1'
              livenessProbe:
                enabled: true
                httpGet:
                  path: /cluster/status
                  scheme: HTTP
                initialDelaySeconds: 20
                periodSeconds: 30
                successThreshold: 1
                failureThreshold: 4
                timeoutSeconds: 10
              readinessProbe:
                enabled: true
                httpGet:
                  path: /cluster/status
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 45
                successThreshold: 2
                failureThreshold: 100
                timeoutSeconds: 10
            volume:
              enabled: true
              repository: null
              imageName: null
              imageTag: null
              imageOverride: null
              restartPolicy: null
              port: 8080
              grpcPort: 18080
              metricsPort: 9327
              ipBind: "0.0.0.0"
              replicas: 1
              loggingOverrideLevel: null
              pulseSeconds: null
              index: null
              fileSizeLimitMB: null
              minFreeSpacePercent: 7
              dataDirs:
                - name: data
                  type: "existingClaim"
                  claimName: "swfs-volume-data"
                  maxVolumes: 0
              idx: ""
              logs: ""
              compactionMBps: "50"
              rack: null
              dataCenter: null
              readMode: proxy
              whiteList: null
              imagesFixOrientation: false
              sidecars: []
              initContainers: ""
              extraVolumes: ""
              extraVolumeMounts: ""
              podManagementPolicy: Parallel
              affinity: |
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: {{ template "seaweedfs.name" . }}
                          app.kubernetes.io/instance: {{ .Release.Name }}
                          app.kubernetes.io/component: volume
                      topologyKey: kubernetes.io/hostname
              resources: null
              tolerations: ""
              nodeSelector: |
                kubernetes.io/arch: amd64
              priorityClassName: ""
              serviceAccountName: ""
              extraEnvironmentVars:
              livenessProbe:
                enabled: true
                httpGet:
                  path: /status
                  scheme: HTTP
                initialDelaySeconds: 20
                periodSeconds: 90
                successThreshold: 1
                failureThreshold: 4
                timeoutSeconds: 30
              readinessProbe:
                enabled: true
                httpGet:
                  path: /status
                  scheme: HTTP
                initialDelaySeconds: 15
                periodSeconds: 15
                successThreshold: 1
                failureThreshold: 100
                timeoutSeconds: 30
            filer:
              enabled: true
              repository: null
              imageName: null
              imageTag: null
              imageOverride: null
              restartPolicy: null
              replicas: 1
              port: 8888
              grpcPort: 18888
              metricsPort: 9327
              loggingOverrideLevel: null
              filerGroup: ""
              defaultReplicaPlacement: "000"
              disableDirListing: false
              maxMB: null
              encryptVolumeData: false
              redirectOnRead: false
              dirListLimit: 100000
              disableHttp: false
              enablePVC: false
              storage: 25Gi
              storageClass: null
              data:
                type: "existingClaim"
                claimName: "swfs-filer-data"
              logs:
                type: "hostPath"
                size: ""
                storageClass: ""
                hostPathPrefix: /storage
              sidecars: []
              initContainers: ""
              extraVolumes: ""
              extraVolumeMounts: ""
              podManagementPolicy: Parallel
              affinity: |
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    - labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: {{ template "seaweedfs.name" . }}
                          app.kubernetes.io/instance: {{ .Release.Name }}
                          app.kubernetes.io/component: filer
                      topologyKey: kubernetes.io/hostname
              updatePartition: 0
              resources: null
              tolerations: ""
              nodeSelector: |
                kubernetes.io/arch: amd64
              priorityClassName: ""
              serviceAccountName: ""
              ingress:
                enabled: false
                className: "nginx"
                host: "seaweedfs.cluster.local"
                annotations: |
                  nginx.ingress.kubernetes.io/backend-protocol: GRPC
                  nginx.ingress.kubernetes.io/auth-type: "basic"
                  nginx.ingress.kubernetes.io/auth-secret: "default/ingress-basic-auth-secret"
                  nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required - SW-Filer'
                  nginx.ingress.kubernetes.io/service-upstream: "true"
                  nginx.ingress.kubernetes.io/rewrite-target: /$1
                  nginx.ingress.kubernetes.io/use-regex: "true"
                  nginx.ingress.kubernetes.io/enable-rewrite-log: "true"
                  nginx.ingress.kubernetes.io/ssl-redirect: "false"
                  nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
                  nginx.ingress.kubernetes.io/configuration-snippet: |
                    sub_filter '<head>' '<head> <base href="/sw-filer/">'; #add base url
                    sub_filter '="/' '="./';                               #make absolute paths to relative
                    sub_filter '=/' '=./';
                    sub_filter '/seaweedfsstatic' './seaweedfsstatic';
                    sub_filter_once off;
              extraEnvironmentVars:
                WEED_MYSQL_ENABLED: "false"
                WEED_MYSQL_HOSTNAME: "mysql-db-host"
                WEED_MYSQL_PORT: "3306"
                WEED_MYSQL_DATABASE: "sw_database"
                WEED_MYSQL_CONNECTION_MAX_IDLE: "5"
                WEED_MYSQL_CONNECTION_MAX_OPEN: "75"
                WEED_MYSQL_CONNECTION_MAX_LIFETIME_SECONDS: "600"
                WEED_MYSQL_INTERPOLATEPARAMS: "true"
                WEED_LEVELDB2_ENABLED: "true"
                WEED_FILER_OPTIONS_RECURSIVE_DELETE: "false"
                WEED_FILER_BUCKETS_FOLDER: "/buckets"
              livenessProbe:
                enabled: true
                httpGet:
                  path: /
                  scheme: HTTP
                initialDelaySeconds: 20
                periodSeconds: 30
                successThreshold: 1
                failureThreshold: 5
                timeoutSeconds: 10
              readinessProbe:
                enabled: true
                httpGet:
                  path: /
                  scheme: HTTP
                initialDelaySeconds: 10
                periodSeconds: 15
                successThreshold: 1
                failureThreshold: 100
                timeoutSeconds: 10
              secretExtraEnvironmentVars: []
              s3:
                enabled: true
                port: 8333
                httpsPort: 0
                allowEmptyFolder: false
                domainName: "{{ .seaweedfs_s3_endpoint }}"
                enableAuth: true
                existingConfigSecret: seaweedfs-s3-secret
                auditLogConfig: {}
            s3:
              enabled: false
              repository: null
              imageName: null
              imageTag: null
              restartPolicy: null
              replicas: 1
              bindAddress: 0.0.0.0
              port: 8333
              httpsPort: 0
              metricsPort: 9327
              loggingOverrideLevel: null
              allowEmptyFolder: true
              enableAuth: false
              existingConfigSecret: null
              auditLogConfig: {}
              domainName: ""
              sidecars: []
              initContainers: ""
              extraVolumes: ""
              extraVolumeMounts: ""
              resources: {}
              tolerations: ""
              nodeSelector: |
                kubernetes.io/arch: amd64
              priorityClassName: ""
              serviceAccountName: ""
              logs:
                type: "hostPath"
                size: ""
                storageClass: ""
                hostPathPrefix: /storage
              extraEnvironmentVars:
              livenessProbe:
                enabled: true
                httpGet:
                  path: /status
                  scheme: HTTP
                initialDelaySeconds: 20
                periodSeconds: 60
                successThreshold: 1
                failureThreshold: 20
                timeoutSeconds: 10
              readinessProbe:
                enabled: true
                httpGet:
                  path: /status
                  scheme: HTTP
                initialDelaySeconds: 15
                periodSeconds: 15
                successThreshold: 1
                failureThreshold: 100
                timeoutSeconds: 10
              ingress:
                enabled: false
                className: "nginx"
                host: "seaweedfs.cluster.local"
                annotations: []
                tls: []
            certificates:
              commonName: "SeaweedFS CA"
              ipAddresses: []
              keyAlgorithm: rsa
              keySize: 2048
              duration: 2160h
              renewBefore: 360h
              externalCertificates:
                enabled: false
            podLabels: {}
            podAnnotations: {}
