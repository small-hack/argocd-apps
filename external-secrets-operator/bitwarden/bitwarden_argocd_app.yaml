---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwarden-eso-provider
  namespace: argocd
spec:
  project: external-secrets-operator
  source:
    repoURL: 'https://github.com/jokajak/bitwarden-eso-provider'
    targetRevision: support_bw_appid
    path: charts/bitwarden-eso-provider/
    helm:
      values: |
        network_policy: false
        bitwarden_eso_provider:
          auth:
            existingSecret: bweso-login
  destination:
    server: "https://kubernetes.default.svc"
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
